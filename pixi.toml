# packages/lerobot-isaac-dashboard/pixi.toml
# DORMANT in monorepo mode — only active after spinout via git subtree split.
# In monorepo mode the root pixi.toml governs all environments.

[workspace]
name = "lerobot-isaac-dashboard"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.10,<3.12"
pip = "*"

[pypi-dependencies]
lerobot-isaac-dashboard = { path = ".", editable = true }

[feature.dev.dependencies]
pytest = "*"
hatchling = "*"
pyyaml = "*"

[feature.dev.pypi-dependencies]
streamlit = ">=1.32"
plotly = ">=5.20"
pandas = ">=2.1"
pyarrow = ">=15.0"
jinja2 = ">=3.1"
watchdog = ">=3.0"

[environments]
default = ["dev"]
